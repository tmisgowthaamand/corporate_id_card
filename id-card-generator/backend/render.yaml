services:
  - type: web
    name: corporate-id-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: MONGO_DB
        value: id_card_generator
      - key: FRONTEND_URL
        value: https://corporate-id-card.vercel.app
      - key: MONGO_URI
        sync: false
